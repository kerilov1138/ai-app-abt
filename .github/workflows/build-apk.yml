name: Build Flet Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (Flet)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 21 (Zulu LTS)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install flet
          fi

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Configure Flutter and Android Licenses
        run: |
          flutter config --no-analytics
          yes | sdkmanager --licenses || echo "sdkmanager not found or licenses already accepted"

      - name: Build APK using Flet
        run: |
          echo "y" | flet build apk --project "youtube_analiz" --org "com.example" --product "Youtube Analiz" --output build/apk --verbose

      - name: Verify APK Generation
        run: |
          echo "Derleme çıktıları kontrol ediliyor..."
          ls -la build/apk || echo "Çıktı klasörü bulunamadı!"
          find build -name "*.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-apk-release
          path: build/apk/*.apk

      - name: Get Current Date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${ steps.date.outputs.date }
          name: APK Release - ${ steps.date.outputs.date }
          draft: false
          prerelease: false
          files: build/apk/*.apk
          body: |
            Tebrikler! Flet uygulamanız başarıyla derlendi ve APK dosyası oluşturuldu.
            
            **Detaylar:**
            - **Uygulama Adı:** Youtube Analiz
            - **Paket Kimliği:** com.example.youtube_analiz
            - **Derleme Zamanı:** ${ steps.date.outputs.date }
            - **Java Sürümü:** 21 (Zulu LTS)
            - **Platform:** Android (APK)
            
            Aşağıdaki bağlantıdan APK dosyasını indirip Android cihazınıza kurabilirsiniz.
        env:
          GITHUB_TOKEN: ${ secrets.GITHUB_TOKEN }
