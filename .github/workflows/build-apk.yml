name: Build Kivy/Python APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK (Buildozer)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17 (LTS)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev testresources zip unzip

      - name: Build APK using Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: 3.10
          buildozer-cmd: buildozer -v android debug

      - name: Verify APK Generation
        run: |
          echo "Derleme çıktıları kontrol ediliyor..."
          ls -la bin || echo "bin klasörü bulunamadı!"
          find bin -name "*.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-apk-release
          path: bin/*.apk

      - name: Get Current Date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${ steps.date.outputs.date }
          name: APK Release - ${ steps.date.outputs.date }
          draft: false
          prerelease: false
          files: bin/*.apk
          body: |
            Tebrikler! Python/Kivy uygulamanız Buildozer ile başarıyla derlendi ve APK dosyası oluşturuldu.
            
            **Detaylar:**
            - **Uygulama Adı:** yansima
            - **Derleme Zamanı:** ${ steps.date.outputs.date }
            - **Java Sürümü:** 17 (Zulu LTS)
            - **Platform:** Android (APK)
            
            Aşağıdaki bağlantıdan APK dosyasını indirip Android cihazınıza kurabilirsiniz.
        env:
          GITHUB_TOKEN: ${ secrets.GITHUB_TOKEN }
