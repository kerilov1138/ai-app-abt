name: build_release
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: assets/www/package-lock.json

      - name: Build web app (fail-fast)
        run: |
          if [ ! -f assets/www/package.json ]; then
            echo "assets/www/package.json bulunamadi."
            exit 1
          fi

          pushd assets/www
          npm ci
          npm run build
          if [ ! -f dist/index.html ]; then
            echo "dist/index.html uretilmedi."
            exit 1
          fi
          popd

          rm -rf /tmp/www_dist
          mkdir -p /tmp/www_dist
          cp -R assets/www/dist/. /tmp/www_dist
          rm -rf assets/www/*
          cp -R /tmp/www_dist/. assets/www/
          test -f assets/www/index.html

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Android scaffold exists
        run: |
          if [ ! -f android/app/build.gradle ] && [ ! -f android/app/build.gradle.kts ]; then
            echo "Android scaffold eksik, flutter create ile olusturuluyor..."
            flutter create . --platforms=android --org com.bebekcam
          fi

      - name: Flutter embedding health check (v1 guard)
        run: |
          BAD=0
          TMP_REPORT="$(mktemp)"
          if [ -d android ]; then
            if grep -R --line-number "io\.flutter\.app\.FlutterActivity" android >"$TMP_REPORT" 2>/dev/null; then
              echo "ERROR: Deprecated Flutter v1 embedding detected: io.flutter.app.FlutterActivity"
              cat "$TMP_REPORT"
              BAD=1
            fi
            if grep -R --line-number "io\.flutter\.app\.FlutterApplication" android >>"$TMP_REPORT" 2>/dev/null; then
              echo "ERROR: Deprecated Flutter v1 embedding detected: io.flutter.app.FlutterApplication"
              cat "$TMP_REPORT"
              BAD=1
            fi
            if grep -R --line-number "FlutterFragmentActivity" android/app/src/main/AndroidManifest.xml 2>/dev/null; then
              echo "INFO: FlutterFragmentActivity reference found in manifest (verify activity class implementation)."
            fi
          fi

          if [ "$BAD" -ne 0 ]; then
            {
              echo "## Flutter Embedding Health Check"
              echo ""
              echo "- Status: FAILED"
              echo "- Reason: Deprecated Android v1 embedding usage detected."
              echo ""
              echo "### Matches"
              echo '```text'
              cat "$TMP_REPORT"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Build stopped due to deprecated Android v1 embedding usage."
            exit 1
          else
            {
              echo "## Flutter Embedding Health Check"
              echo ""
              echo "- Status: PASSED"
              echo "- Deprecated Android v1 embedding usage not found."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Flutter pub get
        run: flutter pub get
      - name: Create Native Splash
        run: dart run flutter_native_splash:create
      - name: Build release APK
        run: flutter build apk --release
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Generate clean tag name
        id: tag_gen
        run: |
          REF_NAME="${{ github.ref_name }}"
          CLEAN_TAG=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9.-]/_/g' | sed 's/^[.-]*//' | sed 's/[.-]*$//')
          if [ -z "$CLEAN_TAG" ] || [ "$CLEAN_TAG" = "main" ] || [ "$CLEAN_TAG" = "master" ]; then
            CLEAN_TAG="v1.0.${{ github.run_number }}"
          elif [[ ! "$CLEAN_TAG" =~ ^v ]]; then
            CLEAN_TAG="v$CLEAN_TAG"
          fi
          echo "tag=$CLEAN_TAG" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_gen.outputs.tag }}
          name: App Release ${{ steps.tag_gen.outputs.tag }}
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
