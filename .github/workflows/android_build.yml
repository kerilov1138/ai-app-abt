name: build_release
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: assets/www/package-lock.json

      - name: Build web app (fail-fast)
        run: |
          if [ ! -f assets/www/package.json ]; then
            echo "assets/www/package.json bulunamadi."
            exit 1
          fi

          pushd assets/www
          npm ci
          npm run build
          if [ ! -f dist/index.html ]; then
            echo "dist/index.html uretilmedi."
            exit 1
          fi
          popd

          rm -rf /tmp/www_dist
          mkdir -p /tmp/www_dist
          cp -R assets/www/dist/. /tmp/www_dist
          rm -rf assets/www/*
          cp -R /tmp/www_dist/. assets/www/
          test -f assets/www/index.html

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Android scaffold exists
        run: |
          if [ ! -f android/app/build.gradle ] && [ ! -f android/app/build.gradle.kts ]; then
            echo "Android scaffold eksik, flutter create ile olusturuluyor..."
            flutter create . --platforms=android --org com.kelime_oyunu
          fi

      - name: Flutter pub get
        run: flutter pub get
      - name: Create Native Splash
        run: dart run flutter_native_splash:create
      - name: Build release APK
        run: flutter build apk --release
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: App Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
