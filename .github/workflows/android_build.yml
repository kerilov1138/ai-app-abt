name: build_release
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # Daha kararlÄ± LTS sÃ¼rÃ¼mÃ¼
      
      - name: Auto-Build Web Content (Source to Build)
        run: |
          cd assets/www
          if [ -f "package.json" ]; then
            echo "package.json detected. Running cloud build..."
            npm install
            npm run build || echo "Build failed or no build script, continuing..."
            
            # Detect build output folder
            for folder in dist build out web-build; do
              if [ -d "$folder" ]; then
                echo "Found build folder: $folder"
                # Move build result to root of assets/www
                mv "$folder"/* . 
                break
              fi
            done
          fi
          cd ../..

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Cleanup rogue Gradle files in assets
        run: find assets/www -name "gradle" -type d -exec rm -rf {} + || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7
          validate-wrappers: false # Web assets iÃ§indeki geÃ§ersiz jar'larÄ±n hata vermesini engeller

      - name: Build with Gradle
        run: gradle assembleRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: App Release v1.0.0
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
