name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request: 
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Depoyu Klonla (Checkout)
        uses: actions/checkout@v4

      - name: Java JDK 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Gradle Calistirilabilirlik Izinleri
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          elif [ -f app/gradlew ]; then
            chmod +x app/gradlew
          else
            echo "Gradle wrapper bulunamadi, olusturuluyor..."
            gradle wrapper
            chmod +x gradlew
          fi

      - name: APK Derleme (Debug)
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: APK Dosyasini Bul ve KIVVAANC Olarak Yeniden Adlandir
        run: |
          echo "Derlenen tum APK dosyalari araniyor..."
          find . -name "*.apk" -type f
          APK_PATH=$(find app/build/outputs/apk/ -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
          fi
          if [ -n "$APK_PATH" ]; then
            mv "$APK_PATH" ./KIVVAANC.apk
            echo "APK basariyla ./KIVVAANC.apk konumuna tasindi."
          else
            echo "HATA: APK dosyasi bulunamadi!"
            exit 1
          fi

      - name: KIVVAANC APK Dosyasini Yukle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: KIVVAANC
          path: ./KIVVAANC.apk
