name: Android APK Build - kivo

on:
  push:
    branches: [ "main", "master" ]
  pull_request: 
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: JDK 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Gradle Kurulumu
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle Wrapper Yetkilendir
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "gradlew bulunamadı, Gradle Wrapper oluşturuluyor..."
            gradle wrapper
            chmod +x gradlew
          fi

      - name: Projeyi Derle (Assemble Debug)
        run: ./gradlew assembleDebug --no-daemon

      - name: APK Dosyasını Bul ve Yeniden Adlandır (kıvo.apk)
        run: |
          echo "Derlenen APK aranıyor..."
          APK_FILE=$(find app/build/outputs/apk/debug/ -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find . -name "*-debug.apk" -type f | head -n 1)
          fi
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
          fi
          
          if [ -n "$APK_FILE" ]; then
            echo "Bulunan APK yolu: $APK_FILE"
            mv "$APK_FILE" ./kıvo.apk
            echo "Başarıyla ./kıvo.apk olarak kopyalandı."
          else
            echo "Hata: APK dosyası bulunamadı!"
            exit 1
          fi

      - name: APK Dosyasını Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: kıvo
          path: ./kıvo.apk
          if-no-files-found: error