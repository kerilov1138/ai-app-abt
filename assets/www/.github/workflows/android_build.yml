name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04 # Use the latest stable Ubuntu as recommended in logs

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Java 21 (Zulu)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Build Web Assets (Vite)
      run: |
        echo "Building Web Assets..."
        # 1. Clean previous build artifacts
        rm -rf node_modules package-lock.json dist assets/www
        
        # 2. Install dependencies (Clean Install)
        npm install
        
        # 3. Fix for "Cannot find native binding" by ensuring esbuild for Linux
        npm install -D esbuild-linux-64
        
        # 4. Production Build (Fail-fast: if this fails, the job stops)
        npm run build
        
        # 5. Verification: Check if build output exists
        if [ ! -f "dist/index.html" ]; then
          echo "Error: Web build failed to produce dist/index.html"
          exit 1
        fi

    - name: Prepare Assets for Flutter
      run: |
        echo "Preparing assets/www..."
        # Create a fresh directory for Flutter assets
        mkdir -p assets/www
        
        # Copy ONLY the build output (dist/) to assets/www/
        # This prevents source code from being included in the APK
        cp -r dist/* assets/www/
        
        # Final verification before Flutter build
        if [ ! -f "assets/www/index.html" ]; then
          echo "Error: assets/www/index.html is missing after copy."
          exit 1
        fi

    - name: Dynamically Update pubspec.yaml Assets
      run: python3 scripts/update_assets.py

    - name: Ensure Flutter Project Structure
      run: |
        # If android folder is missing, create it properly
        if [ ! -d "android" ]; then
          flutter create . --platforms=android --org com.kelime_oyunu
        fi
        # Remove default test/ folder to avoid unnecessary build checks
        rm -rf test

    - name: Install Flutter Dependencies
      run: flutter pub get

    - name: Generate Splash Screen
      run: dart run flutter_native_splash:create

    - name: Build APK (Release)
      run: |
        # Build without tree-shaking icons to avoid known font issues in some environments
        flutter build apk --release --no-tree-shake-icons

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: App Release ${{ github.ref_name }}
        files: build/app/outputs/flutter-apk/app-release.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
