name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Java 21 (Zulu)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Build Web Assets (Vite)
      run: |
        # Fix for "Cannot find native binding" and npm bugs
        rm -rf node_modules package-lock.json
        npm install
        # Force esbuild for Linux to avoid native binding issues
        npm install -D esbuild-linux-64
        # Build using the root config
        npx vite build --config ./vite.config.ts

    - name: Prepare Assets for Flutter
      run: |
        # Ensure fresh assets/www directory
        rm -rf assets/www
        mkdir -p assets/www
        # Copy built web files (one single index.html and assets)
        cp -r dist/* assets/www/
        # Security check
        if [ ! -f "assets/www/index.html" ]; then
          echo "Error: index.html not found after build."
          exit 1
        fi

    - name: Dynamically Update pubspec.yaml Assets
      run: python3 scripts/update_assets.py

    - name: Ensure Flutter Project Structure
      run: |
        # Recreate android folder to ensure it's clean and has correct org
        if [ ! -d "android" ]; then
          flutter create . --platforms=android --org com.kelime_oyunu
        fi
        # Remove default tests if they cause issues
        rm -rf test 

    - name: Install Flutter Dependencies
      run: flutter pub get

    - name: Generate Splash Screen
      run: dart run flutter_native_splash:create

    - name: Build APK (Release)
      run: flutter build apk --release --no-tree-shake-icons

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: App Release ${{ github.ref_name }}
        files: build/app/outputs/flutter-apk/app-release.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
